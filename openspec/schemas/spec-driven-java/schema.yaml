name: spec-driven-java
version: 1
description: Default OpenSpec workflow - proposal → specs → design → tasks
artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: >
      创建变更提案文档。**文档结构 MUST 严格遵循 template（proposal.md）**，不得增删
      template 中的 ## 章节标题，不得改用 Why/What Changes/Capabilities/Impact 等
      英文 OpenSpec 默认章节。


      按 template 各节填写内容约束：

      - **## 1. 业务提案 (Why)**：1-2 段说明问题或机会；填写「业务背景与价值」「预期收益」；
        聚焦 why，不写实现细节（how 属于 design.md）。

      - **## 2. 变更范围 (Scope)**：分别列出 In Scope / Out Scope；
        填写「### 非功能性需求 (NFR)」，明确性能、可靠性和安全要求；
        在「### 新功能变更 (New Capabilities)」下用 kebab-case 列出每个新 capability（每个对应
        `specs/<name>/spec.md`）；在「### 已有功能变更 (Delta Capabilities)」下列出需 delta spec 的
        已有 capability（查 `openspec/specs/`），无则写「无」；**BREAKING** 变更须
        在 In Scope 中显式标注。

      - **## 3. 系统影响点**：填写依赖模块与兼容性说明。


      Capabilities 列表是 proposal 与 specs 的契约：列出的每个 capability 在 specs
      阶段 MUST 有对应 spec 文件。全文控制在 1-2 页。
    requires: []
  - id: specs
    generates: specs/**/*.md
    description: Detailed specifications for the change
    template: spec.md
    instruction: >
      创建规格文档，定义系统 SHOULD 做什么。**每个 capability 一个文件**，路径为
      `specs/<capability>/spec.md`（capability 名与 proposal「新功能变更/已有功能
      变更」一致）。


      **文档结构 MUST 严格遵循 template（spec.md）**，不得用 `## ADDED Requirements`、
      `### Requirement:`、`#### Scenario:` 等 OpenSpec 默认格式替代 template 主结构。


      按 template 各节填写内容约束：

      - **### 需求**: 填写 capability 中文名称。

      - **### 1. 目标与变更规范**：一句话描述 + 复杂度标记（🟢/🟡/🔴）；
        在 **Delta 增删改规范** 中标注变更类型（新增/修改/删除/废弃），
        修改已有 spec 时 MUST 写完整更新内容（不可只写 diff 片段）；
        删除/废弃 MUST 含 Reason 与 Migration；

      - **### 2. 业务场景定义 (What)**：使用 BDD (Given/When/Then) 格式描述 Happy Path 与 Edge Cases；
        每个场景用 **#### 场景: [场景名]**，含前置条件、触发事件、预期结果和异常处理。

      - **### 3. 验收标准 (Acceptance Criteria)**：每条 MUST 使用 EARS 语法的 5 种标准模式之一
       （Ubiquitous, Event-driven, State-driven, Unwanted behavior, Optional feature）；
        normative 用语用 SHALL/MUST；每条验收标准对应一个可测试场景。

      Archive 兼容：Delta 信息写在「Delta 增删改规范」内，勿另起
      `## ADDED Requirements` 顶层章节。
    requires:
      - proposal
  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: >
      创建技术设计文档，说明 HOW 实现 specs。**文档结构 MUST 严格遵循 template
      （design.md）**，不得增删 template 中的 ## 章节，不得改用 Context/Goals/
      Decisions/Risks 等英文 OpenSpec 默认章节替代 template 主结构。


      按 template 各节填写内容约束：

      - **## 1. 代码现状分析 (Current State)**：必须有代码出处（文件路径 + 类名/方法名），说明当前代码执行链路与风险。

      - **## 2. 技术方案概述 (How)**：如何实现 spec 规格；关键技术选型与架构说明；
        可含 ASCII/代码块示意数据流，但不写逐行实现。

      - **## 3. 存储与数据流设计**：填写数据库/表结构变更（含 DDL 或字段说明）、
        缓存策略（无则写「本次不使用缓存」及理由）。

      - **## 4. 面向失败设计 (Design for Failure)**：明确降级策略、熔断机制、幂等性和重试策略。

      - **## 5. 接口定义 (API Design)**：对内/对外接口；建议遵循 RFC 9457 标准设计错误响应；
        Java 项目可写接口签名、配置项、record 定义，REST 项目按 template 示例写路径与 JSON。

      - **## 6. 技术方案对比 (ADR)**：MUST 提供 2-3 个方案（方案 A/B/C），每项含技术栈、
        优劣势、适合场景、预估工作量；在 **### 建议与架构决策** 中给出推荐，并记录 Rationale 和 Trade-offs。

      - **# 约束与边界**：遵守 template 列出的约束（方案数量、复杂度匹配项目规模等）。


      背景、目标/非目标、风险、迁移、待决问题等内容 MUST 写入上述 template 章节
      内（如概述、方案对比、存储设计），勿另起与 template 平级的英文章节。
    requires:
      - proposal
  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: >
      创建实现任务清单。**文档结构 MUST 严格遵循 template（tasks.md）**，保留
      `## 任务清单`、`### 准则`、`### N. **Task N**`、`- **目标**`、
      `- [ ] X.Y [层级标签] …`、`- **摘要：涉及文件**` 等结构，不得改用
      `## 1. Setup` 等英文 OpenSpec 默认分组，不得在末尾用全局「总结：累计涉及文件」
      替代每个 Task 的文件摘要。


      内容约束：

      - **### 准则**：保留 template 含义，可按本次 change 微调表述，但不得删除
        checkbox 格式要求与 MECE/分层拆分原则。

      - **Task 拆分**：按 数据层 → 接口层 → 业务层 → 测试 顺序组织子任务；
        每个 Task 为可独立提交的原子变更（约 3–5 个文件）；每个子任务 MUST 为
        `- [ ] X.Y [层级标签] 描述`（apply 追踪依赖此格式）；层级标签从
        前置条件/数据层/接口层/业务层/测试中按实际选取，勿机械套用 1.1/1.2/1.3 固定语义。

      - **摘要**：每个 Task 末尾 MUST 有 `- **摘要：涉及文件**` 列表。

      - **范围**：不得偏离 specs/design；参考 specs 定做什么，design 定怎么做；
        每项子任务可独立验证完成状态。
    requires:
      - specs
      - design
apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Read context files, work through pending tasks, mark complete as you go.
    Pause if you hit blockers or need clarification.
